name: Advanced CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  gitleaks-scan:
    name: Gitleaks Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Run Gitleaks scan
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/repo" \
            zricethezav/gitleaks:latest detect \
            --source=/repo \
            --verbose \
            --redact \
            --exit-code 0

  client-trivy-fs:
    name: Client Trivy FS Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.5

      - name: Run Trivy filesystem scan on client
        run: trivy fs ./client --format table --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0

  server-trivy-fs:
    name: Server Trivy FS Scan
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.5

      - name: Run Trivy filesystem scan on server
        run: trivy fs ./server --format table --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0

  client-lint:
    name: Client Lint
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Run client lint
        run: npm run lint --if-present
        continue-on-error: true

  server-lint:
    name: Server Lint
    runs-on: ubuntu-latest
    needs: gitleaks-scan

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Run server lint
        run: npm run lint --if-present
        continue-on-error: true

  client-test:
    name: Client Test
    runs-on: ubuntu-latest
    needs:
      - client-trivy-fs
      - client-lint

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Run client tests
        run: npm test --if-present
        continue-on-error: true

  server-test:
    name: Server Test
    runs-on: ubuntu-latest
    needs:
      - server-trivy-fs
      - server-lint

    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: npm ci

      - name: Run server tests
        run: npm test --if-present
        continue-on-error: true

  client-build:
    name: Client Build
    runs-on: ubuntu-latest
    needs: client-test

    defaults:
      run:
        working-directory: client

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: npm ci

      - name: Build client
        run: npm run build --if-present

      - name: Upload client build artifact
        uses: actions/upload-artifact@v4
        with:
          name: client-build
          path: |
            client/build
            client/dist
          if-no-files-found: ignore

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs:
      - client-build
      - server-test

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t three-tier-app:${{ github.sha }} .

  image-scan:
    name: Trivy Image Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.5

      - name: Build Docker image for scan
        run: docker build -t three-tier-app:${{ github.sha }} .

      - name: Run Trivy image scan
        run: trivy image three-tier-app:${{ github.sha }} --format table --severity HIGH,CRITICAL --ignore-unfixed --exit-code 0
